name: API Contract Tests CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clean install dependencies
        run: |
          rm -rf node_modules
          npm ci

      - name: Run Unit Tests with Coverage
        run: ./node_modules/.bin/jest tests/unit --coverage

      - name: Run Integration Tests
        run: ./node_modules/.bin/jest tests/integration

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/